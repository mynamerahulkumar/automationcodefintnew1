server:
  host: 0.0.0.0
  port: 7003

bot:
  enabled: true
  polling_interval_seconds: 30
  always_refresh_cli: true
  cli_refresh_every: 3
  paper_trade: true

strategy:
  name: Long Straddle EMA Confirmation
  entry_time: "09:20"
  square_off_time: "15:20"

ema:
  enabled: true
  fast: 9
  slow: 21
  timeframe: 5m   # match your chart: 5m / 15m / 1d

trading:
  exchange: NSE
  underlying: NIFTY
  expiry: WEEKLY
  quantity: 75
  product_type: INTRADAY
  validity: DAY

option_selection:
  type: ATM
  strike_offset: 0

order:
  order_type: LIMIT
  limit_buffer: 0.50

risk:
  stop_loss_percent: 10
  take_profit_percent: 20
  trailing_enabled: true
  trailing_type: PERCENT
  trailing_percent: 5

security:
  symbol: NIFTY
  security_id: "13"   # required on 1GB VMs — skip CSV on poll path
  # skip_instrument_master: false  # keep false for option CE/PE CSV lookup at entry

logging:
  level: INFO
  console: true
  file: true
