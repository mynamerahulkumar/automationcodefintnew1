# Credentials live in .env (DHAN_CLIENT_ID, DHAN_ACCESS_TOKEN) — not here.
#
# BANKNIFTY-Aug2026-31000-CE (security_id 35564) has no candles/LTP on Dhan
# (DH-905 / last_price 0). Use a traded strike such as 52000 CE below.

market:
  exchange: NSE
  instrument: OPTION
  trading_symbol: BANKNIFTY
  security_id: "58920"
  expiry: "2026-08-25 14:30:00"
  strike: 52000
  option_type: "CE"

strategy:
  mode: EMA_RSI
  timeframe: 1d

polling:
  seconds: 30
  startup_poll_logs: 3

market_hours:
  enabled: true
  open: "09:20"
  close: "15:30"

ema:
  enabled: true
  fast: 9
  slow: 21

rsi:
  enabled: true
  period: 14
  buy: 60
  sell: 40

trade:
  quantity: 30
  order_type: LIMIT
  product_type: INTRADAY
  transaction_type: BUY
  limit_buffer: 0.10
  paper_trade: false

risk:
  take_profit_percent: 1
  stop_loss_percent: 0.5

logging:
  level: INFO
